services:
  postgres:
    image: postgres:17
    container_name: real_time_ticketing_system_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abhinav123
      POSTGRES_DB: real_time_ticketing_system

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: real_time_ticketing_system_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
    - ./backend:/app
    
    depends_on:
      - postgres

volumes:
  postgres_data: